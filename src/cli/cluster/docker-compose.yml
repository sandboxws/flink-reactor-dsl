services:
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "${FLINK_PORT:-8081}:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 10

  taskmanager-1:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  taskmanager-2:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  sql-gateway:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    ports:
      - "${SQL_GATEWAY_PORT:-8083}:8083"
    command:
      [
        "bash",
        "-c",
        "/opt/flink/bin/sql-gateway.sh start-foreground -Dsql-gateway.endpoint.rest.address=0.0.0.0 -Dsql-gateway.endpoint.rest.port=8083 -Djobmanager.rpc.address=jobmanager -Drest.address=jobmanager -Drest.port=8081",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/info"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      # KRaft mode (built-in, no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: internal (for Flink) + external (for host)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: flink-reactor-postgres
    command: postgres -c shared_preload_libraries=timescaledb
    profiles:
      - timescaledb
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: reactor
      POSTGRES_PASSWORD: reactor
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactor -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-plain:
    image: postgres:17-alpine
    container_name: flink-reactor-postgres
    profiles:
      - postgres-plain
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: reactor
      POSTGRES_PASSWORD: reactor
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactor -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    ports:
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs-s3-config.json:/etc/seaweedfs/s3.json:ro
    networks:
      default:
        aliases:
          - seaweedfs.flink-demo.svc
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8333/ | head -c 1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs-init:
    image: amazon/aws-cli:2.22.0
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - sh
      - -c
      - "aws --endpoint-url http://seaweedfs:8333 s3 mb s3://flink-state 2>/dev/null || true"
    restart: "no"

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    depends_on:
      seaweedfs:
        condition: service_healthy
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    environment:
      CATALOG_WAREHOUSE: s3://flink-state/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://seaweedfs:8333
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8181/v1/config >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  flink-checkpoints:
  flink-data:
  postgres-data:
  seaweedfs-data:
