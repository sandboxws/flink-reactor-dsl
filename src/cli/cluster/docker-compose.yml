services:
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "${FLINK_PORT:-8081}:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 10

  taskmanager-1:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  taskmanager-2:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  sql-gateway:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    ports:
      - "${SQL_GATEWAY_PORT:-8083}:8083"
    command: >
      bash -c "
        /opt/flink/bin/sql-gateway.sh start-foreground
        -Dsql-gateway.endpoint.rest.address=0.0.0.0
        -Dsql-gateway.endpoint.rest.port=8083
        -Djobmanager.rpc.address=jobmanager
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/info"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      # KRaft mode (built-in, no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: internal (for Flink) + external (for host)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flink-checkpoints:
  flink-data:
