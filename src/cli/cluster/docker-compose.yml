services:
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "${FLINK_PORT:-8081}:8081"
    command: jobmanager
    # Override DNS for lakekeeper.localtest.me inside containers so it
    # resolves to the host gateway instead of looping back to the container.
    # Browser uses the same hostname via public DNS (→ 127.0.0.1) so the
    # UI's API calls are same-origin with BASE_URI. See iceberg-init.ts.
    extra_hosts:
      - "lakekeeper.localtest.me:host-gateway"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 10

  taskmanager-1:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    extra_hosts:
      - "lakekeeper.localtest.me:host-gateway"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  taskmanager-2:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    extra_hosts:
      - "lakekeeper.localtest.me:host-gateway"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend.type: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        s3.endpoint: http://seaweedfs:8333
        s3.path.style.access: true
        s3.access-key: admin
        s3.secret-key: admin
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-data:/opt/flink/data

  sql-gateway:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      jobmanager:
        condition: service_healthy
    ports:
      - "${SQL_GATEWAY_PORT:-8083}:8083"
    extra_hosts:
      - "lakekeeper.localtest.me:host-gateway"
    command:
      [
        "bash",
        "-c",
        "/opt/flink/bin/sql-gateway.sh start-foreground -Dsql-gateway.endpoint.rest.address=0.0.0.0 -Dsql-gateway.endpoint.rest.port=8083 -Djobmanager.rpc.address=jobmanager -Drest.address=jobmanager -Drest.port=8081",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/info"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      # KRaft mode (built-in, no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: internal (for Flink) + external (for host)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: flink-reactor-postgres
    # wal_level=logical + matching senders/slots are required for the
    # Postgres CDC Pipeline Connector consumed by the pg-fluss-paimon
    # template. See OpenSpec change 53-prepare-postgres-for-cdc.
    command: postgres -c shared_preload_libraries=timescaledb -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    profiles:
      - timescaledb
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: reactor
      POSTGRES_PASSWORD: reactor
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactor -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-plain:
    image: postgres:17-alpine
    container_name: flink-reactor-postgres
    # See `postgres` service above for rationale on wal_level=logical etc.
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    profiles:
      - postgres-plain
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: reactor
      POSTGRES_PASSWORD: reactor
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactor -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    ports:
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs-s3-config.json:/etc/seaweedfs/s3.json:ro
    networks:
      default:
        aliases:
          - seaweedfs.flink-demo.svc
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8333/ | head -c 1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs-init:
    image: amazon/aws-cli:2.22.0
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - sh
      - -c
      - "aws --endpoint-url http://seaweedfs:8333 s3 mb s3://flink-state 2>/dev/null || true"
    restart: "no"

  # Creates the `lakekeeper` Postgres database before Lakekeeper boots.
  # Idempotent — uses pg_database lookup before issuing CREATE.
  lakekeeper-pg-init:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: reactor
    entrypoint:
      - sh
      - -c
      - |
        until pg_isready -h flink-reactor-postgres -U reactor; do
          echo "Waiting for Postgres..."; sleep 2;
        done
        psql -h flink-reactor-postgres -U reactor -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='lakekeeper'" | grep -q 1 || \
          psql -h flink-reactor-postgres -U reactor -d postgres -c 'CREATE DATABASE lakekeeper'
    restart: "no"

  # Runs Lakekeeper's DB migrations once before the main server starts.
  # Idempotent — re-running on an already-migrated DB is a no-op.
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    depends_on:
      lakekeeper-pg-init:
        condition: service_completed_successfully
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://reactor:reactor@flink-reactor-postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://reactor:reactor@flink-reactor-postgres:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: dev-only-not-secret
      RUST_LOG: info
    command: ["migrate"]
    restart: "no"

  # Service name kept as `iceberg-rest` for backward-compat with iceberg-init.ts
  # and minikube manifests; the image is Lakekeeper, which serves the catalog
  # at /catalog/v1, the management API at /management/v1, and a UI at /ui.
  iceberg-rest:
    image: quay.io/lakekeeper/catalog:latest
    depends_on:
      seaweedfs:
        condition: service_healthy
      lakekeeper-migrate:
        condition: service_completed_successfully
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://reactor:reactor@flink-reactor-postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://reactor:reactor@flink-reactor-postgres:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: dev-only-not-secret
      # `lakekeeper.localtest.me` resolves to 127.0.0.1 via public DNS (works
      # in any browser without /etc/hosts edits). Inside containers we
      # override DNS via extra_hosts so the same URL routes to the host
      # gateway. One URL satisfies the in-network Flink client AND the
      # browser-served UI — making the UI's API calls same-origin.
      LAKEKEEPER__BASE_URI: http://lakekeeper.localtest.me:8181
      LAKEKEEPER__AUTHZ_BACKEND: allow-all
      RUST_LOG: info
    command: ["serve"]
    # No in-container healthcheck — Lakekeeper's image is distroless (no shell,
    # no wget/curl). Liveness is verified externally by health-check.ts, and
    # downstream waits go through `iceberg-rest-init` which polls /health.

  # One-shot bootstrap: wait for Lakekeeper's /health, accept terms, then
  # register the warehouse pointing at SeaweedFS. Idempotent — re-runs return
  # 409 / 404, which we swallow.
  iceberg-rest-init:
    image: curlimages/curl:8.10.1
    depends_on:
      iceberg-rest:
        condition: service_started
    entrypoint:
      - sh
      - -c
      - |
        set -e
        until curl -fsS http://iceberg-rest:8181/health >/dev/null 2>&1; do
          echo "Waiting for Lakekeeper..."; sleep 2;
        done
        curl -fsS -X POST http://iceberg-rest:8181/management/v1/bootstrap \
          -H 'content-type: application/json' \
          -d '{"accept-terms-of-use":true}' || true
        curl -fsS -X POST http://iceberg-rest:8181/management/v1/warehouse \
          -H 'content-type: application/json' \
          -d '{
            "warehouse-name":"flink-warehouse",
            "project-id":"00000000-0000-0000-0000-000000000000",
            "storage-profile":{
              "type":"s3",
              "bucket":"flink-state",
              "key-prefix":"warehouse",
              "endpoint":"http://seaweedfs:8333",
              "region":"us-east-1",
              "path-style-access":true,
              "flavor":"minio",
              "sts-enabled":false
            },
            "storage-credential":{
              "type":"s3",
              "credential-type":"access-key",
              "aws-access-key-id":"admin",
              "aws-secret-access-key":"admin"
            }
          }' || true
    restart: "no"

volumes:
  flink-checkpoints:
  flink-data:
  postgres-data:
  seaweedfs-data:
