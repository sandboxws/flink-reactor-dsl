; Grafana baseline config for the local FlinkReactor observability stack.
; Bind-mounted into the grafana container at /etc/grafana/grafana.ini —
; shadowed env vars (e.g. GF_AUTH_ANONYMOUS_ENABLED) still take precedence.

[server]
; Path to a custom CSS file Grafana injects into every page. Mounts under
; /etc/grafana/theme/ via docker-compose. The Gruvppuccin theme matches
; FlinkReactor Console palette so the two UIs feel like one product.
custom_css_path = /etc/grafana/theme/gruvppuccin.css

[users]
default_theme = dark
; Land users on the FlinkReactor "Flink Cluster Overview" dashboard rather
; than Grafana's stock home. The UID below matches dashboards/flink-overview.json.
home_page = /d/flink-overview/flink-cluster-overview

[auth.anonymous]
enabled = true
org_role = Viewer

[analytics]
; This is a developer cluster — disable the phone-home pings.
reporting_enabled = false
check_for_updates = false

[news]
news_feed_enabled = false
