################################################################
# Apache Fluss 0.9.0-incubating server.yaml
#
# This file is the SINGLE SOURCE OF TRUTH for the Fluss broker
# config across both runtime lanes:
#
#   • Minikube — mounted via the `fluss-config` ConfigMap defined
#     in `src/cli/sim/manifests/11-fluss.yaml`. The ConfigMap
#     `kubectl create configmap fluss-config --from-file=...` step
#     in `sim.ts` reads this file directly.
#
#   • Docker  — mounted via a compose volume by change 52
#     (`52-add-fluss-docker-compose-services`). Lane-specific
#     overrides (e.g. ZK address list size) are passed via env
#     vars rather than a divergent file.
#
# Format note: despite the .yaml extension, Fluss uses a flat
# Flink-conf-style parser — values are taken verbatim after the
# first `: ` separator. Quotes around values become part of the
# value (e.g. `"1"` parses to a 3-char string `"1"`, not int 1),
# which then explodes on type coercion. Write values RAW — no
# quotes — even for strings.
#
# Reference: https://fluss.apache.org/docs/0.9/install-deploy/
################################################################

# ── Coordination ──────────────────────────────────────────────
# ZooKeeper is still required in 0.9; Raft is roadmap-only.
# Three-node ensemble in minikube; single-node in docker (the
# extra entries are ignored if unreachable in 0.9 ZK-client mode).
zookeeper.address: zk-fluss-0.zk-fluss:2181,zk-fluss-1.zk-fluss:2181,zk-fluss-2.zk-fluss:2181
zookeeper.path.root: /fluss

# ── Coordinator ───────────────────────────────────────────────
# Fluss 0.9 rejects configs that set both `coordinator.host` and
# `bind.listeners` (Endpoint.loadBindEndpoints in fluss-common).
# We use the legacy host/port pair: it's the smallest deployment
# surface (no per-pod `advertised.listeners` plumbing required),
# and the fallback path constructs an endpoint with listener
# name "FLUSS" via DEFAULT_LISTENER_NAME — the same identity
# we previously set explicitly.
coordinator.host: fluss-coordinator
coordinator.port: 9123

# ── Tablet server ─────────────────────────────────────────────
# tablet-server.host and tablet-server.id are pod-specific and
# overridden via env vars in 11-fluss.yaml (and per-service in
# the compose file). Listed here as documentation of the keys.
# tablet-server.host: <set per-pod>
# tablet-server.id:   <set per-pod>
tablet-server.port: 9124

# ── Storage ───────────────────────────────────────────────────
data.dir: /tmp/fluss-data
remote.data.dir: s3a://flink-state/fluss-remote

# ── S3 (SeaweedFS) for remote-storage tier ────────────────────
# Reuses the same SeaweedFS bucket created by 06-seaweedfs-init.
s3.endpoint: http://seaweedfs.flink-demo.svc:8333
s3.path.style.access: true
s3.access.key: admin
s3.secret.key: admin
s3.region: us-east-1

# ── Defaults ──────────────────────────────────────────────────
default.replication.factor: 1
default.bucket.number: 3
log.segment.bytes: 1073741824
