apiVersion: v1
kind: Namespace
metadata:
  name: flink-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: flink-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: flink-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink
  namespace: flink-demo
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "services"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["*"]
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments", "flinksessionjobs"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink
  namespace: flink-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: flink-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flink-sim-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "services", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flink-sim-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flink-sim-reader
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: flink-demo
