apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-fluss-config
  namespace: flink-demo
data:
  ALLOW_ANONYMOUS_LOGIN: "yes"
  ZOO_4LW_COMMANDS_WHITELIST: "ruok,mntr,srvr,stat"
  ZOO_TICK_TIME: "2000"
  ZOO_INIT_LIMIT: "10"
  ZOO_SYNC_LIMIT: "5"
---
apiVersion: v1
kind: Service
metadata:
  name: zk-fluss
  namespace: flink-demo
  labels:
    app: zk-fluss
spec:
  selector:
    app: zk-fluss
  ports:
    - name: client
      port: 2181
      targetPort: 2181
    - name: follower
      port: 2888
      targetPort: 2888
    - name: election
      port: 3888
      targetPort: 3888
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zk-fluss
  namespace: flink-demo
  labels:
    app: zk-fluss
spec:
  serviceName: zk-fluss
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: zk-fluss
  template:
    metadata:
      labels:
        app: zk-fluss
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 2181
            - name: follower
              containerPort: 2888
            - name: election
              containerPort: 3888
          env:
            - name: ZOO_MY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ZOO_SERVERS
              value: "server.1=zk-fluss-0.zk-fluss:2888:3888;2181 server.2=zk-fluss-1.zk-fluss:2888:3888;2181 server.3=zk-fluss-2.zk-fluss:2888:3888;2181"
          envFrom:
            - configMapRef:
                name: zk-fluss-config
          command:
            - sh
            - -c
            - |
              # Strip the StatefulSet pod-name suffix index off ZOO_MY_ID and shift to 1-based.
              # zk-fluss-0 → "1", zk-fluss-1 → "2", zk-fluss-2 → "3"
              export ZOO_MY_ID=$(( ${HOSTNAME##*-} + 1 ))
              exec /docker-entrypoint.sh zkServer.sh start-foreground
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo ruok | nc -w 2 127.0.0.1 2181 | grep -q imok"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: datalog
              mountPath: /datalog
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: datalog
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
