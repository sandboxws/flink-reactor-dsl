apiVersion: batch/v1
kind: Job
metadata:
  name: seaweedfs-init-bucket
  namespace: flink-demo
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-seaweedfs
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z seaweedfs 8333; do echo 'Waiting for SeaweedFS S3...'; sleep 2; done"]
      containers:
        - name: create-bucket
          image: amazon/aws-cli:2.22.0
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "admin"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          command:
            - sh
            - -c
            - |
              aws --endpoint-url http://seaweedfs:8333 s3 mb s3://flink-state 2>/dev/null || true
              echo "Bucket flink-state ready"
              aws --endpoint-url http://seaweedfs:8333 s3 ls
