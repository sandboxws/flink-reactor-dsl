apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: flink-demo
  labels:
    app: iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:latest
          ports:
            - name: rest
              containerPort: 8181
          env:
            - name: CATALOG_WAREHOUSE
              value: "s3://flink-state/warehouse"
            - name: CATALOG_IO__IMPL
              value: "org.apache.iceberg.aws.s3.S3FileIO"
            - name: CATALOG_S3_ENDPOINT
              value: "http://seaweedfs.flink-demo.svc:8333"
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "admin"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: flink-demo
spec:
  selector:
    app: iceberg-rest
  ports:
    - name: rest
      port: 8181
      targetPort: 8181
